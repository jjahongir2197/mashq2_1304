<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>

<style>

body {
font-family: Arial;
background-color: #fafafa;
}

.card {

background-color: white;

padding: 15px;

margin: 10px;

border-radius: 8px;

box-shadow: 0px 0px 5px gray;

width: 250px;

}

.container {

display: flex;

flex-wrap: wrap;

}

.info {

background-color: lightgreen;

padding: 15px;

margin-top: 20px;

}

</style>

</head>

<body>

<h1>Products</h1>

<div class="container">

{% for p in products %}

<div class="card">

<h2>{{ p.name }}</h2>

<p>Price: {{ p.price }} $</p>

</div>

{% endfor %}

</div>

<div class="info">

<h2>Average Price: {{ average }}</h2>

<h2>Most Expensive:
{{ expensive.name }}
</h2>

<h2>Cheapest:
{{ cheap.name }}
</h2>

</div>

</body>
</html>
